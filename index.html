<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALVO GROUP - Grammar Mastery Test</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Gaya CSS Tetap Sama Seperti Aslinya */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #ffffff 0%, #e3f2fd 30%, #bbdefb 70%, #ffebee 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            overflow-x: hidden;
        }

        .tiktok-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* Bagian Password Screen Dihapus dari CSS untuk kebersihan */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            width: 100%;
            animation: slideIn 0.3s ease-out;
        }

        .hidden { display: none !important; }

        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Style lainnya tetap dipertahankan agar tampilan tidak berubah */
        .hero-section {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            border-bottom-right-radius: 40px;
            border-bottom-left-radius: 40px;
            margin-bottom: 30px;
        }

        .btn-start {
            background: #1e3a8a;
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3);
            margin-top: 20px;
        }
        
        /* ... Sisa CSS Anda tetap sama ... */
    </style>
</head>
<body>

    <div class="tiktok-container">
        <div id="startScreen" class="screen">
            <div class="hero-section">
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">SALVO GROUP</h1>
                <p style="font-size: 1.1rem; opacity: 0.9;">Grammar Mastery Test</p>
            </div>

            <div style="padding: 20px; text-align: center;">
                <div style="font-size: 4rem; margin-bottom: 20px;">🏆</div>
                <h2 style="font-size: 1.8rem; color: #1e3a8a; margin-bottom: 15px;">Uji Kemampuanmu!</h2>
                <p style="color: #64748b; line-height: 1.6; margin-bottom: 30px;">
                    Selesaikan 50 soal Error Recognition untuk mengetahui level bahasa Inggrismu secara akurat.
                </p>
                <button class="btn-start" onclick="startQuiz()">MULAI SEKARANG</button>
            </div>
        </div>

        <div id="quizScreen" class="screen hidden">
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div id="qNumber" style="font-weight: bold; margin-bottom: 10px;">Soal 1/50</div>
            <div class="question-card" id="questionCard">
                <div id="qText" class="question-text"></div>
                <div id="options" class="options-container"></div>
            </div>
        </div>

        <div id="endScreen" class="screen hidden">
            </div>
    </div>

    <script>
        // DATA SOAL TETAP SAMA
        const questions = [
            { t: "The list of names ARE posted on the board.", o: ["The", "list", "names", "ARE"], c: 3, e: "Subjek tunggal 'The list' harus diikuti 'IS'." },
            // ... (Seluruh soal Anda tetap di sini)
        ];

        let currentQ = 0;
        let score = 0;

        // FUNGSI MULAI KUIS LANGSUNG
        function startQuiz() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            loadQuestion();
        }

        // FUNGSI LOAD QUESTION, CHECK ANSWER, DAN LAINNYA TETAP SAMA
        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('qNumber').innerText = `Soal ${currentQ + 1}/${questions.length}`;
            document.getElementById('progress').style.width = `${((currentQ) / questions.length) * 100}%`;
            document.getElementById('qText').innerText = q.t;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(idx) {
            const q = questions[currentQ];
            const options = document.querySelectorAll('.option');
            
            if (idx === q.c) {
                options[idx].classList.add('correct');
                score++;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                options[idx].classList.add('wrong');
                options[q.c].classList.add('correct');
            }

            // Tunggu sebentar lalu lanjut soal berikutnya
            setTimeout(() => {
                currentQ++;
                if (currentQ < questions.length) {
                    loadQuestion();
                } else {
                    showEnd();
                }
            }, 1500);
        }

        // ... Sisa fungsi JavaScript lainnya ...
        function showEnd() {
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            // Logika perhitungan skor akhir Anda
        }
    </script>
</body>
</html>
